<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Модерн Хаус — 30 Color Theme Previews</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#0a0a0a;color:#fff;scroll-behavior:smooth}

/* ── TOP NAV ── */
.toc{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,10,10,0.96);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,0.08);padding:10px 16px;display:flex;gap:5px;flex-wrap:wrap;align-items:center;justify-content:center}
.toc a{font-family:'Bebas Neue';font-size:12px;letter-spacing:0.12em;padding:5px 10px;border-radius:5px;text-decoration:none;color:rgba(255,255,255,0.45);border:1px solid rgba(255,255,255,0.08);transition:all 0.25s}
.toc a:hover{color:#fff;border-color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.06)}
.toc-label{font-family:'Plus Jakarta Sans';font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.25);margin:0 6px}

/* ── THEME SECTION ── */
.theme{min-height:100vh;position:relative;overflow:hidden;padding-top:70px}
.theme-label{position:absolute;top:130px;left:24px;font-family:'Bebas Neue';font-size:13px;letter-spacing:0.3em;opacity:0.35;z-index:3}
.swatches{display:flex;gap:6px;position:absolute;top:130px;right:24px;z-index:3}
.sw{width:22px;height:22px;border-radius:50%;border:2px solid rgba(128,128,128,0.25)}

/* ── NAVBAR ── */
.navbar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;position:relative;z-index:2}
.nav-logo{font-family:'Bebas Neue';font-size:22px;letter-spacing:0.15em}
.nav-links{display:flex;gap:20px;font-size:12px;letter-spacing:0.05em}
.nav-links a{text-decoration:none;transition:color 0.3s}
.nav-menu{width:24px;height:2px;position:relative}
.nav-menu::before,.nav-menu::after{content:'';position:absolute;width:24px;height:2px;left:0}
.nav-menu::before{top:-7px}
.nav-menu::after{top:7px}

/* ── HERO ── */
.hero{position:relative;height:65vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.hero-overlay{position:absolute;inset:0}
.hero-content{position:relative;z-index:2;text-align:center;padding:32px;max-width:700px}
.hero-content h1{font-family:'Bebas Neue';font-size:clamp(32px,7vw,72px);letter-spacing:0.12em;line-height:1;margin-bottom:12px}
.hero-content p{font-size:13px;line-height:1.7;margin-bottom:24px;max-width:500px;margin-left:auto;margin-right:auto}
.hero-divider{width:50px;height:2px;margin:16px auto}
.hero-btn{display:inline-block;padding:12px 32px;font-family:'Bebas Neue';font-size:14px;letter-spacing:0.2em;text-decoration:none;border:none;cursor:pointer;transition:all 0.3s;border-radius:4px}

/* ── STATS ── */
.stats-bar{display:flex;justify-content:center;gap:48px;padding:36px 24px;flex-wrap:wrap}
.stat{text-align:center}
.stat-val{font-family:'Bebas Neue';font-size:38px;letter-spacing:0.08em}
.stat-lbl{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;opacity:0.45;margin-top:4px}

/* ── CARDS ── */
.cards-section{padding:50px 24px}
.cards-section h2{font-family:'Bebas Neue';font-size:30px;letter-spacing:0.12em;text-align:center;margin-bottom:36px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;max-width:860px;margin:0 auto}
.card{padding:26px;border-radius:12px;transition:transform 0.3s}
.card:hover{transform:translateY(-3px)}
.card-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-size:17px}
.card h3{font-family:'Bebas Neue';font-size:17px;letter-spacing:0.08em;margin-bottom:5px}
.card p{font-size:12px;line-height:1.6}

/* ── GALLERY ── */
.gallery-section{padding:30px 24px 50px}
.gallery-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:860px;margin:0 auto}
.gallery-grid img{width:100%;height:160px;object-fit:cover;border-radius:7px;transition:transform 0.3s,opacity 0.3s;opacity:0.85}
.gallery-grid img:hover{transform:scale(1.03);opacity:1}

/* ── SERVICES ── */
.services-section{padding:50px 24px}
.services-section h2{font-family:'Bebas Neue';font-size:30px;letter-spacing:0.12em;text-align:center;margin-bottom:36px}
.services-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;max-width:860px;margin:0 auto}
.service-card{padding:0;border-radius:12px;overflow:hidden;transition:transform 0.3s}
.service-card:hover{transform:translateY(-3px)}
.service-card img{width:100%;height:160px;object-fit:cover}
.service-card-body{padding:20px}
.service-card h3{font-family:'Bebas Neue';font-size:18px;letter-spacing:0.08em;margin-bottom:6px}
.service-card p{font-size:11px;line-height:1.6}

/* ── TESTIMONIAL ── */
.testimonial-section{padding:50px 24px;max-width:700px;margin:0 auto;text-align:center}
.testimonial-card{padding:36px;border-radius:14px;position:relative}
.testimonial-card .quote-mark{font-family:Georgia,serif;font-size:60px;line-height:1;opacity:0.15;position:absolute;top:10px;left:20px}
.testimonial-card blockquote{font-size:14px;line-height:1.8;font-style:italic;margin-bottom:16px;position:relative}
.testimonial-card .author{font-family:'Bebas Neue';font-size:14px;letter-spacing:0.1em}
.testimonial-card .role{font-size:11px;opacity:0.5}

/* ── CTA ── */
.cta-section{padding:60px 24px;text-align:center;position:relative;overflow:hidden}
.cta-section h2{font-family:'Bebas Neue';font-size:clamp(28px,5vw,44px);letter-spacing:0.1em;margin-bottom:8px}
.cta-section p{font-size:13px;margin-bottom:24px;opacity:0.6;max-width:500px;margin-left:auto;margin-right:auto}
.cta-btn{display:inline-block;padding:14px 40px;font-family:'Bebas Neue';font-size:15px;letter-spacing:0.2em;text-decoration:none;border:none;cursor:pointer;transition:all 0.3s;border-radius:4px}

/* ── CONTACT BAR ── */
.contact-bar{display:flex;justify-content:center;gap:32px;padding:28px 24px;flex-wrap:wrap;font-size:12px}
.contact-item{display:flex;align-items:center;gap:8px}
.contact-icon{font-size:16px}

/* ── PROJECTS ── */
.projects-section{padding:50px 24px}
.projects-section h2{font-family:'Bebas Neue';font-size:30px;letter-spacing:0.12em;text-align:center;margin-bottom:36px}
.projects-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;max-width:860px;margin:0 auto}
.project-card{border-radius:12px;overflow:hidden;transition:transform 0.3s}
.project-card:hover{transform:translateY(-3px)}
.project-card img{width:100%;height:180px;object-fit:cover}
.project-card-body{padding:18px}
.project-card h3{font-family:'Bebas Neue';font-size:17px;letter-spacing:0.08em;margin-bottom:4px}
.project-card p{font-size:11px;line-height:1.5;margin-bottom:12px}
.project-card .project-specs{display:flex;gap:16px;font-size:10px;letter-spacing:0.05em;opacity:0.5}

/* ── DIVIDER ── */
.section-divider{max-width:860px;margin:0 auto;height:1px;opacity:0.15}

/* ── FOOTER ── */
.footer-bar{padding:18px 28px;text-align:center;font-size:11px;letter-spacing:0.05em;opacity:0.3;border-top-width:1px;border-top-style:solid}

@media(max-width:640px){
  .nav-links{display:none}
  .cards-grid,.services-grid,.projects-grid{grid-template-columns:1fr}
  .gallery-grid{grid-template-columns:repeat(2,1fr)}
  .stats-bar{gap:20px}
  .contact-bar{gap:16px;flex-direction:column;align-items:center}
  .toc{justify-content:flex-start;overflow-x:auto;flex-wrap:nowrap;padding:8px 12px}
  .toc a{white-space:nowrap;font-size:10px;padding:4px 8px}
  .toc-label{display:none}
  .hero{height:55vh}
}
</style>
</head>

function isLight(theme) {
  return theme.type === 'LIGHT' || theme.type === 'MEDIUM';
}

function hexToRgb(hex) {
  const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return result ? `${parseInt(result[1],16)},${parseInt(result[2],16)},${parseInt(result[3],16)}` : '0,0,0';
}

function generateCSS(theme) {
  const t = `t${theme.id}`;
  const light = isLight(theme);
  const bgVal = theme.bgGrad || theme.bg;
  const ar = hexToRgb(theme.accent);
  const tr = hexToRgb(theme.text);
  const or2 = hexToRgb(theme.bg);

  const cardBg = light
    ? `background:#fff;border:1px solid rgba(${ar},0.1);box-shadow:0 2px 14px rgba(0,0,0,0.04)`
    : `background:rgba(${tr},0.03);border:1px solid rgba(${ar},0.1)`;

  const hs = theme.headingGradient
    ? `background:linear-gradient(135deg,${theme.gradColors});-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text`
    : `color:${theme.accent}`;

  const hh = theme.headingGradient
    ? `background:linear-gradient(135deg,${theme.gradColors});-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text`
    : `color:${theme.text}`;

  const oLow = light ? 0.15 : 0.35;
  const oHigh = light ? 0.65 : 0.75;
  const tso = light ? 0.6 : 0.55;
  const cto = light ? 0.55 : 0.5;
  const btnCol = light ? '#fff' : theme.bg;
  const divBg = light ? `rgba(0,0,0,0.08)` : `rgba(${ar},0.15)`;

  return `
.${t}{background:${bgVal}}
.${t} .theme-label{color:${theme.text}}
.${t} .stat-lbl{color:${theme.text}}
.${t} .navbar{border-color:rgba(${ar},0.1)}
.${t} .footer-bar{border-color:rgba(${ar},0.12);color:rgba(${tr},0.3)}
.${t} .nav-logo{color:${theme.text}}
.${t} .nav-links a{color:rgba(${tr},0.5)}
.${t} .nav-links a:hover{color:${theme.accent}}
.${t} .nav-menu,.${t} .nav-menu::before,.${t} .nav-menu::after{background:${theme.accent}}
.${t} .hero-overlay{background:linear-gradient(to bottom,rgba(${or2},${oLow}),rgba(${or2},${oHigh}))}
.${t} .hero-content h1{${hh}}
.${t} .hero-content p{color:rgba(${tr},${tso})}
.${t} .hero-divider{background:${theme.accent}}
.${t} .hero-btn,.${t} .cta-btn{background:${theme.accent};color:${btnCol}}
.${t} .cards-section h2,.${t} .services-section h2,.${t} .projects-section h2{${hs}}
.${t} .card,.${t} .service-card,.${t} .project-card{${cardBg}}
.${t} .card-icon{background:rgba(${ar},0.12);color:${theme.accent}}

// Build TOC
const tocElement = document.getElementById('toc');

  const padId = String(theme.id).padStart(2, '0');
  tocHtml += `<a href="#s${theme.id}">${padId}</a>`;
});
tocElement.innerHTML = tocHtml;
